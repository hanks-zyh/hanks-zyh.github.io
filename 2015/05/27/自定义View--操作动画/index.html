n></span><br><span class="line"><span class="comment">     * @param defStyleAttr</span></span><br><span class="line"><span class="comment">     */</span></span><br><span class="line">    <span class="keyword">private</span> <span class="keyword">void</span> init(Context context, AttributeSet attrs, <span class="built_in">int</span> defStyleAttr) &#123;</span><br><span class="line"></span><br><span class="line">        defaultShapeWidth = dp2px(<span class="number">4</span>);</span><br><span class="line"></span><br><span class="line">        paint = <span class="keyword">new</span> Paint(Paint.ANTI_ALIAS_FLAG);</span><br><span class="line"></span><br><span class="line">        paintShadow = <span class="keyword">new</span> Paint(Paint.ANTI_ALIAS_FLAG);</span><br><span class="line">        setLayerType(LAYER_TYPE_SOFTWARE, paintShadow);</span><br><span class="line"></span><br><span class="line">        shadowWidth = dp2px(<span class="number">4</span>);</span><br><span class="line">        paintShadow.setShadowLayer(shadowWidth, <span class="number">0.0</span>f, dp2px(<span class="number">2</span>), Color.parseColor(<span class="string">"#66000000"</span>));</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">        <span class="comment">// load the styled attributes and set their properties</span></span><br><span class="line">        TypedArray attributes = context.obtainStyledAttributes(attrs, R.styleable.OpAnimationView, defStyleAttr, <span class="number">0</span>);</span><br><span class="line"></span><br><span class="line">        setBackgroundColor(attributes.getColor(R.styleable.OpAnimationView_backgroundColor, Color.parseColor(<span class="string">"#FF4081"</span>)));</span><br><span class="line">        setShapeColor(attributes.getColor(R.styleable.OpAnimationView_shapeColor, Color.parseColor(<span class="string">"#ffffff"</span>)));</span><br><span class="line">        shapeWidth = attributes.getDimensionPixelOffset(R.sty
