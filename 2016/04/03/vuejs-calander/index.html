    <h1 class="article-title" itemprop="name">

te-variable">&#123;&#123; day.getDate() &#125;&#125;</span><span class="xml"><span class="tag">&lt;/<span class="name">span</span>&gt;</span></span></span><br><span class="line"><span class="xml">          <span class="tag">&lt;/<span class="name">span</span>&gt;</span></span></span><br><span class="line"><span class="xml">        <span class="tag">&lt;/<span class="name">li</span>&gt;</span></span></span><br><span class="line"><span class="xml">    <span class="tag">&lt;/<span class="name">ul</span>&gt;</span></span></span><br><span class="line"><span class="xml"><span class="tag">&lt;/<span class="name">div</span>&gt;</span></span></span><br></pre></td></tr></table></figure></p>

ction"><span class="keyword">function</span>(<span class="params">cur</span>) </span>&#123;</span><br><span class="line">                <span class="keyword">var</span> <span class="built_in">date</span>;</span><br><span class="line">                <span class="keyword">if</span> (cur) &#123;</span><br><span class="line">                    <span class="built_in">date</span> = <span class="keyword">new</span> <span class="built_in">Date</span>(cur);</span><br><span class="line">                &#125; <span class="title">else</span> &#123;</span><br><span class="line">                    <span class="built_in">date</span> = <span class="keyword">new</span> <span class="built_in">Date</span>();</span><br><span class="line">                &#125;</span><br><span class="line">                <span class="keyword">this</span>.currentDay = <span class="built_in">date</span>.getDate();</span><br><span class="line">                <span class="keyword">this</span>.currentYear = <span class="built_in">date</span>.getFullYear();</span><br><span class="line">                <span class="keyword">this</span>.currentMonth = <span class="built_in">date</span>.getMonth() + <span class="number">1</span>;</span><br><span class="line">                <span class="keyword">this</span>.currentWeek = <span class="built_in">date</span>.getDay(); <span class="comment">// 1...6,0</span></span><br><span class="line">                <span class="keyword">if</span> (<span class="keyword">this</span>.currentWeek == <span class="number">0</span>) &#123;</span><br><span class="line">                    <span class="keyword">this</span>.currentWeek = <span class="number">7</span>;</span><br><span class="line">                &#125;</span><br><span class="line">                <span class="keyword">var</span> str = <span class="keyword">this</span>.formatDate(<span class="keyword">this</span>.currentYear , <span class="keyword">this</span>.currentMonth, <span class="keyword">this</span>.currentDay);</span><br><span class="line">                <span class="built_in">console</span>.log(<span class="string">"today:"</span> + str + <span class="string">","</span> + <span class="keyword">this</span>.currentWeek);</span><br><span class="line">                <span class="keyword">this</span>.days.length = <span class="number">0</span>;</span><br><span class="line">                <span class="comment">// 今天是周日，放在第一行第7个位置，前面6个</span></span><br><span class="line">                <span class="keyword">for</span> (<span class="keyword">var</span> i = <span class="keyword">this</span>.currentWeek - <span class="number">1</span>; i &gt;= <span class="number">0</span>; i--) &#123;</span><br><span class="line">                    <span class="keyword">var</span> d = <span class="keyword">new</span> <span class="built_in">Date</span>(str);</span><br><span class="line">                    d.setDate(d.getDate() - i);</span><br><span class="line">                    <span class="built_in">console</span>.log(<span class="string">"y:"</span> + d.getDate());</span><br><span class="line">                    <span class="keyword">this</span>.days.push(d);</span><br><span class="line">                &#125;</span><br><span class="line">                <span class="keyword">for</span> (<span class="keyword">var</span> i = <span class="number">1</span>; i &lt;= <span class="number">35</span> - <span class="keyword">this</span>.currentWeek; i++) &#123;</span><br><span class="line">                    <span class="keyword">var</span> d = <span class="keyword">new</span> <span class="built_in">Date</span>(str);</span><br><span class="line">                    d.setDate(d.getDate() + i);</span><br><span class="line">                    <span class="keyword">this</span>.days.push(d);</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;,</span><br><span class="line">            <span class="attribute">pick</span>: <span class="function"><span class="keyword">function</span>(<span class="params">date</span>) </span>&#123;</span><br><span class="line">                alert(<span class="keyword">this</span>.formatDate( <span class="built_in">date</span>.getFullYear() , <span class="built_in">date</span>.getMonth() + <span class="number">1</span>, <span class="built_in">date</span>.getDate()));</span><br><span class="line">            &#125;,</span><br><span class="line">            <span class="attribute">pickPre</span>: <span class="function"><span class="keyword">function</span>(<span class="params">year, month</span>) </span>&#123;</span><br><span class="line">                <span class="comment">//  setDate(0); 上月最后一天</span></span><br><span class="line">                <span class="comment">//  setDate(-1); 上月倒数第二天</span></span><br><span class="line">                <span class="comment">//  setDate(dx) 参数dx为 上月最后一天的前后dx天</span></span><br><span class="line">                <span class="keyword">var</span> d = <span class="keyword">new</span> <span class="built_in">Date</span>(<span class="keyword">this</span>.formatDate(year , month , <span class="number">1</span>));</span><br><span class="line">                d.setDate(<span class="number">0</span>);</span><br><span class="line">                <span class="keyword">this</span>.initData(<span class="keyword">this</span>.formatDate(d.getFullYear(),d.getMonth() + <span class="number">1</span>,<span class="number">1</span>));</span><br><span class="line">            &#125;,</span><br><span class="line">            <span class="attribute">pickNext</span>: <span class="function"><span class="keyword">function</span>(<span class="params">year, month</span>) </span>&#123;</span><br><span class="line">                <span class="keyword">var</span> d = <span class="keyword">new</span> <span class="built_in">Date</span>(<span class="keyword">this</span>.formatDate(year , month , <span class="number">1</span>));</span><br><span class="line"> pan</span>&gt;</span></span></span><br><span class="line"><span class="xml">                <span class="tag">&lt;/<span class="name">li</span>&gt;</span></span></span><br><span class="line"><span class="xml">            <span class="tag">&lt;/<span class="name">ul</span>&gt;</span></span></span><br><span class="line"><span class="xml">        <span class="tag">&lt;/<span class="name">div</span>&gt;</span></span></span><br><span class="line"><span class="xml">        <span class="tag">&lt;<span class="name">script</span> <span class="attr">src</span>=<span class="string">"https://cdnjs.cloudflare.com/ajax/libs/vue/1.0.18/vue.min.js"</span> <span class="attr">type</span>=<span class="string">"text/javascript"</span> <span class="attr">charset</span>=<span class="string">"utf-8"</span>&gt;</span><span class="undefined"></span><span class="tag">&lt;/<span class="name">script</span>&gt;</span></span></span><br><span class="line"><span class="xml">        <span class="tag">&lt;<span class="name">script</span> <span class="attr">type</span>=<span class="string">"text/javascript"</span>&gt;</span><span class="undefined"></span></span></span><br><span class="line"><span class="xml">            new Vue(&#123;</span></span><br><span class="line"><span class="xml">                el: '#calendar',</span></span><br><span class="line"><span class="xml">                data: &#123;</span></span><br><span class="line"><span class="xml">                    currentDay: 1,</span></span><br><span class="line"><span class="xml">                    currentMonth: 1,</span></span><br><span class="line"><span class="xml">                    currentYear: 1970,</span></span><br><span class="line"><span class="xml">                    currentWeek: 1,</span></span><br><span class="line"><span class="xml">                    days: [],</span></span><br><span class="line"><span class="xml">                &#125;,</span></span><br><span class="line"><span class="xml">                created: function() &#123;</span></span><br><span class="line"><span class="xml">                    this.initData(null);</span></span><br><span class="line"><span class="xml">                &#125;,</span></span><br><span class="line"><span class="xml">                methods: &#123;</span></span><br><span class="line"><span class="xml">                    initData: function(cur) &#123;</span></span><br><span class="line"><span class="xml">                        var date;</span></span><br><span class="line"><span class="xml">                        if (cur) &#123;</span></span><br><span class="line"><span class="xml">                            date = new Date(cur);</span></span><br><span class="line"><span class="xml">                        &#125; else &#123;</span></span><br><span class="line"><span class="xml">                            date = new Date();</span></span><br><span class="line"><span class="xml">                        &#125;</span></span><br><span class="line"><span class="xml">                        this.currentDay = date.getDate();</span></span><br><span class="line"><span class="xml">                        this.currentYear = date.getFullYear();</span></span><br><span class="line"><span class="xml">                        this.currentMonth = date.getMonth() + 1;</span></span><br><span class="line"><span class="xml">                        this.currentWeek = date.getDay(); // 1...6,0</span></span><br><span class="line"><span class="xml">                        if (this.currentWeek == 0) &#123;</span></span><br><span class="line"><span class="xml">                            this.currentWeek = 7;</span></span><br><span class="line"><span class="xml">                        &#125;</span></span><br><span class="line"><span class="xml">                        var str = this.formatDate(this.currentYear , this.currentMonth, this.currentDay);</span></span><br><span class="line"><span class="xml">                        console.log("today:" + str + "," + this.currentWeek);</span></span><br><span class="line"><span class="xml">                        this.days.length = 0;</span></span><br><span class="line"><span class="xml">                        // 今天是周日，放在第一行第7个位置，前面6个</span></span><br><span class="line"><span class="xml">                        for (var i = this.currentWeek - 1; i &gt;= 0; i--) &#123;</span></span><br><span class="line"><span class="xml">                            var d = new Date(str);</span></span><br><span class="line"><span class="xml">                            d.setDate(d.getDate() - i);</span></span><br><span class="line"><span class="xml">                            console.log("y:" + d.getDate());</span></span><br><span class="line"><span class="xml">                            this.days.push(d);</span></span><br><span class="line"><span class="xml">                        &#125;</span></span><br><span class="line"><span class="xml">                        for (var i = 1; i <span class="tag">&lt;<span class="name">=</span> <span class="attr">35</span> <span class="attr">-</span> <span class="attr">this.currentWeek</span>; <span class="attr">i</span>++) &#123;</span></span></span><br><span class="line"><span class="xml">                            var d = new Date(str);</span></span><br><span class="line"><span class="xml">                            d.setDate(d.getDate() + i);</span></span><br><span class="line"><span class="xml">                            this.days.push(d);</span></span><br><span class="line"><span class="xml">                        &#125;</span></span><br><span class="line"><span class="xml">                    &#125;,</span></span><br><span class="line"><span class="xml">                    pick: function(date) &#123;</span></span><br><span class="line"><span class="xml">                        alert(this.formatDate( date.getFullYear() , date.getMonth() + 1, date.getDate()));</span></span><br><span class="line"><span class="xml">                    &#125;,</span></span><br
